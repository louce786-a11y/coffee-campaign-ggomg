<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>周末咖啡补给站</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; background: #0a0604; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: #fff5d6; user-select: none; -webkit-user-select: none; }

  .stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  .phone { position: relative; width: min(100vw, 100vh * 9 / 16); aspect-ratio: 9/16; max-width: 480px; background: #1a0f08; overflow: hidden; box-shadow: 0 0 80px rgba(212, 175, 55, 0.15); }

  /* === 动画 1: 背景缓慢呼吸 zoom === */
  @keyframes bgBreath {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .bg { position: absolute; inset: -2%; background: url('background-hires.png') center/cover no-repeat; animation: bgBreath 8s ease-in-out infinite; }

  /* === 动画 2: 顶部柔光叠加 === */
  @keyframes warmFlicker { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.5; } }
  .warm-glow { position: absolute; top: 0; left: 0; right: 0; height: 50%; background: radial-gradient(ellipse at top, rgba(255,180,80,0.25) 0%, transparent 70%); pointer-events: none; animation: warmFlicker 4s ease-in-out infinite; z-index: 1; }

  /* Soft vignette */
  .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%); pointer-events: none; z-index: 2; }

  /* === 动画 3: 咖啡杯口蒸汽粒子 === */
  /* 蒸汽位置: 背景里咖啡杯大约在左下 60%/72% 位置, 蒸汽就贴这儿 */
  .steam-container { position: absolute; left: 58%; top: 68%; transform: translateX(-50%); width: 50px; height: 60px; pointer-events: none; z-index: 3; opacity: 0.85; }
  .steam { position: absolute; bottom: 0; left: 50%; width: 6px; height: 6px; background: rgba(255, 240, 220, 0.7); border-radius: 50%; filter: blur(3px); transform: translateX(-50%); animation: steamRise 3s ease-out infinite; opacity: 0; }
  .steam:nth-child(1) { animation-delay: 0s; }
  .steam:nth-child(2) { animation-delay: 0.6s; left: 40%; }
  .steam:nth-child(3) { animation-delay: 1.2s; left: 60%; }
  .steam:nth-child(4) { animation-delay: 1.8s; left: 45%; }
  .steam:nth-child(5) { animation-delay: 2.4s; left: 55%; }
  @keyframes steamRise {
    0%   { transform: translate(-50%, 0) scale(1); opacity: 0; }
    15%  { opacity: 0.6; }
    100% { transform: translate(-50%, -90px) scale(2.5); opacity: 0; }
  }

  /* Top header */
  @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  .header { position: absolute; top: 3%; left: 0; right: 0; z-index: 5; padding: 0 4%; display: flex; justify-content: space-between; align-items: flex-start; opacity: 0; animation: fadeInDown 0.8s 0.2s ease-out forwards; }
  .logo { flex: 1; padding-right: 10px; }
  .logo-title { font-size: clamp(20px, 4.2vw, 28px); font-weight: 900; line-height: 1; color: #ffd86b; letter-spacing: 1px; animation: logoGlow 2.5s ease-in-out infinite; }
  @keyframes logoGlow {
    0%, 100% { text-shadow: 0 0 12px rgba(255, 200, 80, 0.6), 0 2px 4px rgba(0,0,0,0.8); }
    50% { text-shadow: 0 0 28px rgba(255, 200, 80, 1), 0 2px 4px rgba(0,0,0,0.8), 0 0 60px rgba(255, 200, 80, 0.4); }
  }
  .logo-sub { font-size: clamp(10px, 2vw, 13px); color: #e8c985; margin-top: 4px; text-shadow: 0 1px 2px rgba(0,0,0,0.9); opacity: 0.9; }

  .nav-btns { display: grid; grid-template-columns: repeat(2, 36px); gap: 6px; }
  .nav-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(20, 12, 8, 0.85); border: 1.5px solid #d4af37; color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 600; transition: transform 0.15s, background 0.15s; }
  .nav-btn:active { transform: scale(0.9); background: rgba(40, 25, 15, 0.95); }

  /* === 动画 4: 卡牌弧线浮动 (错峰) === */
  @keyframes floatA { 0%, 100% { transform: translateY(-12px); } 50% { transform: translateY(-4px); } }
  @keyframes floatB { 0%, 100% { transform: translateY(-18px); } 50% { transform: translateY(-8px); } }
  @keyframes floatC { 0%, 100% { transform: translateY(-22px); } 50% { transform: translateY(-10px); } }

  .cards { position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-10%); height: 32%; display: flex; align-items: flex-end; justify-content: center; gap: 1.2%; padding: 0 3%; z-index: 4; pointer-events: none; }
  /* === 弧形布局: 中间高, 两边低 === */
  .card[data-id="C1"] { margin-bottom: 14%; }
  .card[data-id="C2"] { margin-bottom: 14%; }
  .card[data-id="C3"] { margin-bottom: 7%;  }
  .card[data-id="C4"] { margin-bottom: 7%;  }
  .card[data-id="C5"] { margin-bottom: 0%;  }
  .card { position: relative; pointer-events: auto; cursor: pointer; transition: transform 0.2s, filter 0.2s; flex-shrink: 0; opacity: 0; animation: cardEnter 0.6s ease-out forwards, floatA 3.5s 1.5s ease-in-out infinite; }
  .card[data-id="C1"] { animation-delay: 0.4s, 0s; }
  .card[data-id="C3"] { animation: cardEnter 0.6s 0.6s ease-out forwards, floatB 3.5s 0.5s ease-in-out infinite; }
  .card[data-id="C5"] { animation: cardEnter 0.6s 0.8s ease-out forwards, floatC 3.2s 1s ease-in-out infinite; }
  .card[data-id="C4"] { animation: cardEnter 0.6s 1.0s ease-out forwards, floatB 3.7s 1.5s ease-in-out infinite; }
  .card[data-id="C2"] { animation: cardEnter 0.6s 1.2s ease-out forwards, floatA 3.4s 2s ease-in-out infinite; }

  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(80px) scale(0.7); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card:active { filter: brightness(1.2); }
  .card.selected { filter: drop-shadow(0 0 18px gold) brightness(1.1); }
  .card-inner { position: relative; padding: 4% 6% 6%; border-radius: 8px; text-align: center; box-shadow: inset 0 0 0 2px rgba(0,0,0,0.4), 0 4px 12px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: space-between; height: 100%; transition: box-shadow 0.3s; }
  .card-name { font-size: clamp(10px, 1.9vw, 13px); font-weight: 700; margin-bottom: 4%; }
  .card-discount { font-size: clamp(14px, 3vw, 20px); font-weight: 900; line-height: 1.1; margin: 2% 0; }
  .card-prob { font-size: clamp(10px, 2vw, 13px); font-weight: 700; opacity: 0.95; }
  .card-icon { font-size: clamp(20px, 4.5vw, 30px); margin-bottom: 4%; }

  /* Tier colors matching the triptych */
  .tier-outer { width: 14%; background: linear-gradient(180deg, #6b4423 0%, #3d2814 50%, #1f1409 100%); border: 2px solid #3d2814; }
  .tier-outer .card-name { color: #d4b87a; }
  .tier-outer .card-discount { color: #ffd86b; }
  .tier-outer .card-prob { color: #c9a96a; }

  .tier-mid { width: 16%; background: linear-gradient(180deg, #8b6914 0%, #5c4410 50%, #2d1f08 100%); border: 2px solid #8b6914; }
  .tier-mid .card-name { color: #ffe5a0; }
  .tier-mid .card-discount { color: #fff2b8; }
  .tier-mid .card-prob { color: #e8c985; }

  .tier-center { width: 19%; background: linear-gradient(180deg, #d4a857 0%, #8b6914 30%, #5c4410 70%, #2d1f08 100%); border: 3px solid #ffd86b; animation: centerGlow 2.5s ease-in-out infinite !important; }
  @keyframes centerGlow {
    0%, 100% { box-shadow: inset 0 0 0 2px rgba(255, 215, 100, 0.4), 0 0 16px rgba(255, 200, 80, 0.4), 0 6px 20px rgba(0,0,0,0.6); }
    50% { box-shadow: inset 0 0 0 2px rgba(255, 215, 100, 0.9), 0 0 36px rgba(255, 200, 80, 0.85), 0 6px 20px rgba(0,0,0,0.6); }
  }
  .tier-center .card-name { color: #fff5d6; }
  .tier-center .card-discount { color: #ffd86b; font-size: clamp(18px, 4vw, 26px); }
  .tier-center .card-prob { color: #fff2b8; }
  .tier-center::before { content: '👑'; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 18px; filter: drop-shadow(0 0 6px gold); z-index: 2; animation: crownBob 2s ease-in-out infinite; }
  @keyframes crownBob { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-3px); } }

  /* === 动画 5: 中央卡周围旋转星光 === */
  .sparkles { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 0; height: 0; pointer-events: none; z-index: 3; }
  .sparkle { position: absolute; width: 6px; height: 6px; background: #ffd86b; border-radius: 50%; box-shadow: 0 0 6px #ffd86b, 0 0 12px rgba(255,200,80,0.5); animation: sparkleOrbit 4s linear infinite, sparklePulse 1.5s ease-in-out infinite; }
  .sparkle:nth-child(1) { top: -80px; left: 0; animation-delay: 0s, 0s; }
  .sparkle:nth-child(2) { top: 0; left: 80px; animation-delay: -1s, -0.3s; }
  .sparkle:nth-child(3) { top: 80px; left: 0; animation-delay: -2s, -0.6s; }
  .sparkle:nth-child(4) { top: 0; left: -80px; animation-delay: -3s, -0.9s; }
  @keyframes sparkleOrbit { from { transform: rotate(0deg) translateX(0) rotate(0deg); } to { transform: rotate(360deg) translateX(0) rotate(-360deg); } }
  @keyframes sparklePulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  /* === 动画 6: 底部入场 === */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .footer { position: absolute; bottom: 3%; left: 0; right: 0; z-index: 5; padding: 0 4%; opacity: 0; animation: fadeInUp 0.8s 1.4s ease-out forwards; }
  .hint { text-align: center; color: #ffe5a0; font-size: clamp(11px, 2.2vw, 14px); text-shadow: 0 0 8px rgba(255, 200, 80, 0.6), 0 1px 2px rgba(0,0,0,0.9); margin-bottom: 12px; letter-spacing: 1px; animation: hintGlow 3s ease-in-out infinite; }
  @keyframes hintGlow { 0%, 100% { text-shadow: 0 0 8px rgba(255, 200, 80, 0.6), 0 1px 2px rgba(0,0,0,0.9); } 50% { text-shadow: 0 0 16px rgba(255, 200, 80, 0.95), 0 0 32px rgba(255, 200, 80, 0.4), 0 1px 2px rgba(0,0,0,0.9); } }
  .actions { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 12px 0; border-radius: 999px; font-size: clamp(13px, 2.6vw, 16px); font-weight: 700; cursor: pointer; text-align: center; border: none; transition: transform 0.15s, filter 0.15s, box-shadow 0.3s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: linear-gradient(180deg, #f4d578 0%, #d4a857 50%, #8b6914 100%); color: #2d1f08; border: 2px solid #ffd86b; box-shadow: 0 0 12px rgba(255, 200, 80, 0.5), inset 0 1px 0 rgba(255,255,255,0.3); animation: btnPulse 2s 2s ease-in-out infinite; }
  @keyframes btnPulse { 0%, 100% { box-shadow: 0 0 12px rgba(255, 200, 80, 0.5), inset 0 1px 0 rgba(255,255,255,0.3); } 50% { box-shadow: 0 0 24px rgba(255, 200, 80, 0.9), inset 0 1px 0 rgba(255,255,255,0.4); } }
  .btn-secondary { background: linear-gradient(180deg, #3d2814 0%, #1f1409 100%); color: #e8c985; border: 1.5px solid #6b4423; }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .modal-backdrop.show { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: linear-gradient(180deg, #2d1f08 0%, #1a0f04 100%); border: 2px solid #d4af37; border-radius: 16px; padding: 24px 20px; max-width: 320px; width: 100%; text-align: center; position: relative; box-shadow: 0 0 40px rgba(212, 175, 55, 0.3); animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-close { position: absolute; top: 8px; right: 12px; background: none; border: none; color: #d4af37; font-size: 22px; cursor: pointer; padding: 4px 8px; }
  .modal-title { color: #ffd86b; font-size: 18px; font-weight: 800; margin-bottom: 16px; }
  .modal-body { color: #fff5d6; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
  .result-card { background: linear-gradient(180deg, #8b6914 0%, #5c4410 100%); border: 2px solid #ffd86b; border-radius: 12px; padding: 16px; margin: 12px 0; animation: resultReveal 0.6s ease-out; }
  @keyframes resultReveal { 0% { transform: scale(0.3) rotate(-15deg); opacity: 0; } 60% { transform: scale(1.1) rotate(5deg); opacity: 1; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
  .result-name { color: #fff5d6; font-size: 16px; font-weight: 700; }
  .result-discount { color: #ffd86b; font-size: 22px; font-weight: 900; margin: 8px 0; }
  .result-prob { color: #e8c985; font-size: 12px; }
  .result-code { background: #0a0604; border: 1px dashed #d4af37; border-radius: 6px; padding: 8px; margin-top: 8px; font-family: monospace; color: #ffd86b; font-size: 13px; letter-spacing: 1px; }

  /* === 动画 7: 抽卡时洗牌 === */
  .shuffling .card:not(.selected) { animation: shuffleOut 0.4s ease-in-out !important; }
  @keyframes shuffleOut { 0% { transform: scale(1); } 50% { transform: scale(0.85) translateY(20px); } 100% { transform: scale(1); } }
  .spinning .card { animation: shuffleOut 0.3s ease-in-out !important; }

  /* === 动画 8: 礼花 === */
  .confetti { position: absolute; width: 8px; height: 8px; pointer-events: none; z-index: 50; }
  @keyframes confettiFall {
    0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), 200px) rotate(720deg); opacity: 0; }
  }

  /* Toast */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #ffd86b; padding: 10px 20px; border-radius: 999px; border: 1px solid #d4af37; z-index: 200; font-size: 14px; opacity: 0; transition: opacity 0.2s, transform 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.05); }

  /* === Slot Machine Overlay === */
  .slot-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 90; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); flex-direction: column; gap: 16px; }
  .slot-overlay.show { display: flex; animation: fadeIn 0.2s ease; }

  .slot-frame { position: relative; width: min(82vw, 320px); height: 60vw; max-height: 380px; background: #1a0f04; border: 3px solid #d4af37; border-radius: 12px; overflow: hidden; box-shadow: 0 0 40px rgba(255, 200, 80, 0.4), inset 0 0 20px rgba(0,0,0,0.6); }

  .slot-reel { display: flex; height: 100%; will-change: transform; }
  .slot-reel.fast { transition: transform 0.15s linear; }
  .slot-reel.spinning { transition: transform 2.6s cubic-bezier(0.15, 0.95, 0.3, 1); }

  .slot-card { flex-shrink: 0; width: min(82vw, 320px); height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8% 4%; position: relative; }
  .slot-card .card-icon { font-size: clamp(40px, 12vw, 64px); margin-bottom: 4%; }
  .slot-card .card-name { font-size: clamp(16px, 4.5vw, 24px); font-weight: 800; margin-bottom: 6%; }
  .slot-card .card-discount { font-size: clamp(20px, 6vw, 32px); font-weight: 900; line-height: 1.1; margin: 4% 0; }
  .slot-card .card-prob { font-size: clamp(12px, 3vw, 16px); font-weight: 700; }

  .slot-card.tier-outer { background: linear-gradient(180deg, #6b4423 0%, #3d2814 50%, #1f1409 100%); border-left: 1px solid #3d2814; border-right: 1px solid #3d2814; }
  .slot-card.tier-outer .card-name { color: #d4b87a; }
  .slot-card.tier-outer .card-discount { color: #ffd86b; }
  .slot-card.tier-outer .card-prob { color: #c9a96a; }

  .slot-card.tier-mid { background: linear-gradient(180deg, #8b6914 0%, #5c4410 50%, #2d1f08 100%); border-left: 1px solid #8b6914; border-right: 1px solid #8b6914; }
  .slot-card.tier-mid .card-name { color: #ffe5a0; }
  .slot-card.tier-mid .card-discount { color: #fff2b8; }
  .slot-card.tier-mid .card-prob { color: #e8c985; }

  .slot-card.tier-center { background: linear-gradient(180deg, #d4a857 0%, #8b6914 30%, #5c4410 70%, #2d1f08 100%); border-left: 2px solid #ffd86b; border-right: 2px solid #ffd86b; position: relative; }
  .slot-card.tier-center::before { content: '👑'; position: absolute; top: 6%; left: 50%; transform: translateX(-50%); font-size: clamp(20px, 6vw, 32px); filter: drop-shadow(0 0 6px gold); }
  .slot-card.tier-center .card-name { color: #fff5d6; }
  .slot-card.tier-center .card-discount { color: #ffd86b; font-size: clamp(24px, 7vw, 36px); }
  .slot-card.tier-center .card-prob { color: #fff2b8; }

  /* Center pointer/indicator */
  .slot-pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 3px; height: 100%; background: linear-gradient(180deg, transparent 0%, #ffd86b 10%, #fff 50%, #ffd86b 90%, transparent 100%); z-index: 5; pointer-events: none; box-shadow: 0 0 12px gold, 0 0 24px rgba(255, 200, 80, 0.6); animation: pointerPulse 1s ease-in-out infinite; }
  @keyframes pointerPulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

  /* Side fade overlays to make cards "fly past" */
  .slot-frame::before, .slot-frame::after { content: ''; position: absolute; top: 0; bottom: 0; width: 15%; z-index: 4; pointer-events: none; }
  .slot-frame::before { left: 0; background: linear-gradient(90deg, #0a0604 0%, transparent 100%); }
  .slot-frame::after { right: 0; background: linear-gradient(-90deg, #0a0604 0%, transparent 100%); }

  .slot-title { color: #ffd86b; font-size: clamp(18px, 5vw, 26px); font-weight: 800; text-align: center; text-shadow: 0 0 20px rgba(255, 200, 80, 0.6); animation: hintGlow 1.2s ease-in-out infinite; }
  .slot-tick { color: #e8c985; font-size: clamp(11px, 3vw, 14px); text-align: center; opacity: 0.7; }
</style>
</head>
<body>

<div class="stage">
  <div class="phone" id="phone">
    <div class="bg"></div>
    <div class="warm-glow"></div>
    <div class="steam-container">
      <div class="steam"></div>
      <div class="steam"></div>
      <div class="steam"></div>
      <div class="steam"></div>
      <div class="steam"></div>
    </div>
    <div class="vignette"></div>
    <div class="sparkles">
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
    </div>

    <div class="header">
      <div class="logo">
        <div class="logo-title">周末咖啡补给站</div>
        <div class="logo-sub">限时发放咖啡折扣券</div>
      </div>
      <div class="nav-btns">
        <div class="nav-btn" data-action="rules">说明</div>
        <div class="nav-btn" data-action="mine">我的</div>
        <div class="nav-btn" data-action="rank">排行</div>
        <div class="nav-btn" data-action="record">记录</div>
      </div>
    </div>

    <div class="cards" id="cards">
      <div class="card tier-outer arc-up" data-id="C1" data-name="基础券" data-discount="5元满减" data-prob="40" data-weight="40">
        <div class="card-inner">
          <div class="card-icon">☕</div>
          <div class="card-name">基础券</div>
          <div class="card-discount">5元<br>满减券</div>
          <div class="card-prob">40%</div>
        </div>
      </div>
      <div class="card tier-mid" data-id="C3" data-name="经典券" data-discount="免费中杯美式" data-prob="15" data-weight="15">
        <div class="card-inner">
          <div class="card-icon">☕</div>
          <div class="card-name">经典券</div>
          <div class="card-discount">免费<br>中杯美式</div>
          <div class="card-prob">15%</div>
        </div>
      </div>
      <div class="card tier-center" data-id="C5" data-name="至尊券" data-discount="免费任意大杯" data-prob="5" data-weight="5">
        <div class="card-inner">
          <div class="card-icon">👑</div>
          <div class="card-name">至尊券</div>
          <div class="card-discount">免费<br>任意大杯</div>
          <div class="card-prob">5%</div>
        </div>
      </div>
      <div class="card tier-mid" data-id="C4" data-name="豪华券" data-discount="拿铁免费升杯" data-prob="10" data-weight="10">
        <div class="card-inner">
          <div class="card-icon">☕</div>
          <div class="card-name">豪华券</div>
          <div class="card-discount">拿铁<br>免费升杯</div>
          <div class="card-prob">10%</div>
        </div>
      </div>
      <div class="card tier-outer" data-id="C2" data-name="精品券" data-discount="8折优惠" data-prob="30" data-weight="30">
        <div class="card-inner">
          <div class="card-icon">☕</div>
          <div class="card-name">精品券</div>
          <div class="card-discount">8折<br>全场咖啡</div>
          <div class="card-prob">30%</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="hint" id="hint">✦ 试试手气, 稀有券等你带回家 ✦</div>
      <div class="actions">
        <button class="btn btn-secondary" data-action="draw">抽1次</button>
        <button class="btn btn-primary" data-action="invite">邀请好友增加抽奖次数</button>
      </div>
    </div>
  </div>
</div>

<div class="slot-overlay" id="slotOverlay">
  <div class="slot-title">🎰 幸运抽奖中...</div>
  <div class="slot-frame">
    <div class="slot-pointer"></div>
    <div class="slot-reel fast" id="slotReel"></div>
  </div>
  <div class="slot-tick" id="slotTick">点击下方按钮开始 →</div>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <button class="modal-close" id="modalClose">×</button>
    <div class="modal-title" id="modalTitle">提示</div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import {
    COUPONS, ARC_ORDER, RARE_WEIGHT_THRESHOLD, DAILY_FREE_DRAWS,
    weightedPick, PityCounter, DailyLimit, SlotLayout,
  } from './game.js';

  // === 画卡 + 老虎机渲染用的工具 ===
  const tierOf = (id) => id === 'C5' ? 'tier-center'
                       : (id === 'C1' || id === 'C2') ? 'tier-outer'
                       : 'tier-mid';

  // === localStorage 封装 ===
  const LS_COUPONS = 'myCoupons';
  const LS_HISTORY = 'drawHistory';
  const LS_LIMIT   = 'drawLimit_v1'; // DailyLimit.key
  const LS_PITY    = 'pityState_v1';
  const store = {
    get: (k, def) => { try { return JSON.parse(localStorage.getItem(k) || JSON.stringify(def)); } catch { return def; } },
    set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  };

  // ===== Modal helpers =====
  const modal = document.getElementById('modal');
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');
  const modalClose = document.getElementById('modalClose');
  modalClose.onclick = () => modal.classList.remove('show');
  modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };

  function showModal(title, body) {
    modalTitle.textContent = title;
    modalBody.innerHTML = body;
    modal.classList.add('show');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ===== Card select =====
  document.querySelectorAll('.card').forEach(card => {
    card.onclick = () => {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      const data = card.dataset;
      showToast(`已选: ${data.name} (${data.discount})`);
    };
  });

  // ===== Nav buttons =====
  const navActions = {
    rules: () => showModal('活动规则', `
      <div style="text-align:left;font-size:13px;line-height:1.8">
        <p>🎯 <b>活动说明</b></p>
        <p>1. 活动期间每位用户每日可免费抽 ${DAILY_FREE_DRAWS} 次</p>
        <p>2. 连抽 10 次未出稀有, 第 10 次保底出稀有</p>
        <p>3. 优惠券到店出示即可使用</p>
        <p>4. 所有券码可在"我的"中查看</p>
        <br>
        <p style="color:#ffd86b">📅 活动有效期至 2026-06-30</p>
      </div>
    `),
    mine: () => {
      const userCoupons = store.get(LS_COUPONS, []);
      const list = userCoupons.length === 0
        ? '<p style="color:#888">还没有抽到券哦，快去抽奖吧～</p>'
        : userCoupons.slice().reverse().map(c => `<div style="background:rgba(212,175,55,0.1);padding:8px;margin:6px 0;border-radius:6px;text-align:left">
            <b style="color:#ffd86b">${c.name}</b> · ${c.discount} · <span style="font-family:monospace;font-size:11px">${c.code}</span>
          </div>`).join('');
      showModal('我的优惠券', list);
    },
    rank: () => showModal('排行榜', `
      <div style="text-align:left;font-size:13px">
        <p>🥇 <b>本周 TOP 5</b></p>
        <p style="margin:8px 0">1. 用户 9527 · 抽中 23 张至尊券</p>
        <p style="margin:8px 0">2. 用户 8821 · 抽中 19 张</p>
        <p style="margin:8px 0">3. 用户 7766 · 抽中 17 张</p>
        <p style="margin:8px 0">4. 用户 6234 · 抽中 15 张</p>
        <p style="margin:8px 0">5. 用户 5102 · 抽中 12 张</p>
        <p style="color:#888;font-size:11px;margin-top:8px">（演示数据）</p>
      </div>
    `),
    record: () => {
      const records = store.get(LS_HISTORY, []);
      const list = records.length === 0
        ? '<p style="color:#888">暂无抽奖记录</p>'
        : records.slice(0, 10).map(r => `<div style="font-size:12px;padding:4px 0;border-bottom:1px solid rgba(212,175,55,0.2);display:flex;justify-content:space-between">
            <span>${r.time}</span><span style="color:#ffd86b">${r.name}${r.rare ? ' 🏆' : ''}</span>
          </div>`).join('');
      showModal('抽奖记录', list);
    }
  };

  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.onclick = () => navActions[btn.dataset.action]();
  });

  // ===== Pity 状态恢复 =====
  const pity = new PityCounter();
  const savedPity = store.get(LS_PITY, null);
  if (savedPity) pity.sinceRare = savedPity.sinceRare || 0;

  // ===== 剩余次数提示 =====
  const hintEl = document.getElementById('hint');
  function refreshHint() {
    const state = store.get(LS_LIMIT, {});
    const left = DailyLimit.remaining(state);
    if (left > 0) {
      hintEl.textContent = `✦ 今日还剩 ${left} 次免费抽奖 · 连 10 抽保底出稀有 ✦`;
    } else {
      hintEl.textContent = '✦ 今日免费次数用完 · 邀请好友可获得额外次数 ✦';
    }
  }
  refreshHint();

  // ===== Draw (Slot Machine) =====
  let slotBusy = false;
  function doDraw() {
    if (slotBusy) return;
    // 限次检查
    const limitState = store.get(LS_LIMIT, {});
    const left = DailyLimit.remaining(limitState);
    if (left <= 0) {
      showModal('明天再来 ☕', `
        <p>今日 ${DAILY_FREE_DRAWS} 次免费抽奖已用完</p>
        <p style="color:#aaa;font-size:12px;margin-top:8px">邀请好友可获得额外次数</p>
      `);
      return;
    }
    slotBusy = true;

    // === 抽奖计算 (纯逻辑) ===
    const expected = weightedPick();
    const selected = pity.apply(expected);
    store.set(LS_PITY, pity.state);

    const overlay = document.getElementById('slotOverlay');
    const reel = document.getElementById('slotReel');
    const tick = document.getElementById('slotTick');

    // === 用 SlotLayout 生成 reel ===
    const ids = SlotLayout.build(selected.id);
    reel.innerHTML = '';
    ids.forEach(id => {
      const c = COUPONS.find(x => x.id === id);
      const cardEl = document.createElement('div');
      cardEl.className = 'slot-card ' + tierOf(id);
      cardEl.innerHTML = `
        <div class="card-name">${c.name}</div>
        <div class="card-icon">${id === 'C5' ? '👑' : '☕'}</div>
        <div class="card-discount">${c.discount}</div>
        <div class="card-prob">概率 ${c.prob}%</div>
      `;
      reel.appendChild(cardEl);
    });

    overlay.classList.add('show');
    tick.textContent = '准备中...';
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));

    // === Phase 1: fast loop (0.4s, 5 张) ===
    reel.classList.add('fast');
    reel.classList.remove('spinning');
    let fastOffset = 0;
    const cardWidthHint = reel.children[0].offsetWidth || 320;
    const fastAnim = setInterval(() => {
      fastOffset -= cardWidthHint;
      reel.style.transform = `translateX(${fastOffset}px)`;
    }, 80);
    setTimeout(() => clearInterval(fastAnim), 480);

    // === Phase 2: 减速到 winner (2.6s, 紧凑型) ===
    setTimeout(() => {
      tick.textContent = '抽奖中...';
      const cardWidth = reel.children[0].offsetWidth;
      const finalOffset = SlotLayout.finalOffset(cardWidth); // 精准停, 无随机偏移
      reel.classList.remove('fast');
      reel.classList.add('spinning');
      void reel.offsetWidth;
      reel.style.transform = `translateX(${finalOffset}px)`;
    }, 520);

    // === Phase 3: 停卡 + 落幕 (3.4s 总) ===
    setTimeout(() => {
      tick.textContent = '🎉 抽奖结果';
      const code = `COFFEE-${Date.now().toString(36).toUpperCase().slice(-6)}`;
      selected.code = code;

      // 持久化
      const userCoupons = store.get(LS_COUPONS, []);
      userCoupons.push({ ...selected, code, time: Date.now() });
      store.set(LS_COUPONS, userCoupons);

      const records = store.get(LS_HISTORY, []);
      records.unshift({ time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }), name: selected.name, rare: selected.rare });
      store.set(LS_HISTORY, records);

      // 消耗一次抽奖次数
      DailyLimit.consume(limitState);
      store.set(LS_LIMIT, limitState);
      refreshHint();

      setTimeout(() => {
        overlay.classList.remove('show');
        reel.style.transition = 'none';
        reel.style.transform = 'translateX(0)';
        setTimeout(() => { reel.style.transition = ''; }, 50);

        showModal(selected.rare ? '🎉 恭喜抽中稀有券！' : '✨ 抽中优惠券', `
          <div class="result-card">
            <div class="result-name">${selected.name}${selected.rare ? ' 🏆' : ''}</div>
            <div class="result-discount">${selected.discount}</div>
            <div class="result-prob">中奖概率 ${selected.prob}%</div>
            <div class="result-code">${code}</div>
          </div>
          <p style="font-size:12px;color:#aaa;margin-top:8px">券码已保存到"我的"</p>
        `);

        spawnConfetti(selected.rare ? 50 : 25);
        slotBusy = false;
      }, 900);
    }, 3500); // 0.52 + 2.6 + 0.4 = 3.5s, 从原来 5.8s 砍到 3.5s
  }

  // === 礼花粒子 ===
  function spawnConfetti(count) {
    const colors = ['#ffd86b', '#ff6b6b', '#4ecdc4', '#95e1d3', '#f38181', '#aa96da', '#fcbad3', '#ffffd2'];
    for (let i = 0; i < count; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = (50 + (Math.random() - 0.5) * 60) + '%';
      c.style.top = '50%';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.setProperty('--tx', ((Math.random() - 0.5) * 400) + 'px');
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.width = (4 + Math.random() * 6) + 'px';
      c.style.height = c.style.width;
      c.style.animation = `confettiFall ${1.2 + Math.random() * 0.8}s ${Math.random() * 0.2}s ease-out forwards`;
      document.getElementById('phone').appendChild(c);
      setTimeout(() => c.remove(), 2200);
    }
  }

  // ===== Bottom buttons =====
  document.querySelector('[data-action="draw"]').onclick = doDraw;
  document.querySelector('[data-action="invite"]').onclick = () => {
    const inviteLink = `${location.origin}${location.pathname}?invite=demo123`;
    showModal('邀请好友', `
      <p style="margin-bottom:12px">复制链接发给好友，双方各得 +1 次抽奖机会</p>
      <div class="result-code" style="user-select:all;-webkit-user-select:all;cursor:pointer" onclick="navigator.clipboard.writeText('${inviteLink}');showToast('链接已复制！')">${inviteLink}</div>
      <p style="font-size:11px;color:#f38181;margin-top:8px">⚠️ 演示链接, 未接入真实邀请追踪</p>
    `);
  };

  // === 调试钩子 (开发用) ===
  window.__campaign = { pity, store, COUPONS, refreshHint, resetLimit: () => { store.set(LS_LIMIT, {}); store.set(LS_PITY, { sinceRare: 0 }); pity.sinceRare = 0; refreshHint(); } };
</script>

</body>
</html>
